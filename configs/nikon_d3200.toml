[block_enable_status]
dpc  = true
blc  = true
aaf  = true
awb  = true
cnf  = true
cfa  = true
ccm  = true
gac  = true
csc  = true
nlm  = true
bnf  = true
ceh  = true
eeh  = true
fcs  = true
hsc  = true
bcc  = true
scl  = false

[hardware]
raw_width     = 1920
raw_height    = 1080
raw_bit_depth = 12
bayer_pattern = "rggb"

[dpc]
diff_threshold = 30

[blc]
bl_r   = 0
bl_gr  = 0
bl_gb  = 0
bl_b   = 0
alpha  = 0      # x1024
beta   = 0      # x1024

# aaf has no parameters

[awb]
r_gain  = 2415  # x1024
gr_gain = 1024  # x1024
gb_gain = 1024  # x1024
b_gain  = 1168  # x1024

[cnf]
diff_threshold = 0
r_gain         = 2415  # x1024  (mirrors awb.r_gain)
b_gain         = 1168  # x1024  (mirrors awb.b_gain)

[cfa]
mode = "malvar"

[ccm]

# last column is unused here
matrix = [
    [ 1896, -811,  -62, 0],
    [ -160, 1687, -503, 0],
    [   18, -557, 1563, 0],
]

[gac]
gain  = 256   # x256
gamma = 0.42

# csc has no parameters

[nlm]
search_window_size = 11
patch_size         = 5
h                  = 4   # larger -> stronger smoothing

[bnf]
intensity_sigma = 0.5   # larger -> stronger smoothing
spatial_sigma   = 0.4

[ceh]
tiles      = [4, 6]
clip_limit = 0.02

[eeh]
edge_gain        = 512  # x256
flat_threshold   = 2    # delta <= flat_threshold  -> set to 0
edge_threshold   = 4    # delta > edge_threshold  -> amplify by edge_gain
delta_threshold  = 64

[fcs]
delta_min = 4
delta_max = 16

[hsc]
hue_offset      = 0    # degrees
saturation_gain = 256  # x256

[bcc]
brightness_offset = 0
contrast_gain     = 256  # x256

[scl]
width  = 1536
height = 1024
